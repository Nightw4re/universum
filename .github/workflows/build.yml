name: Deploy

env:
  MC_VERSION: 1.21.1

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        type: choice
        options:
          - curseforge
      release_channel:
        description: Release channel
        required: true
        type: choice
        options:
          - release
          - alpha

permissions:
  contents: write

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version changed
        id: version
        shell: bash
        run: |
          current=$(node -p "require('./package.json').version")
          previous=$(git show origin/main:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" || true)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ -n "$previous" ] && [ "$current" = "$previous" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - name: Build ZIP archive
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: universum-zip
          path: build/*.zip
          if-no-files-found: error

  publish_curseforge:
    needs: [version_check, build]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'curseforge') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && needs.version_check.outputs.changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: universum-zip
          path: build
      - name: Publish to CurseForge
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel || (startsWith(github.event.pull_request.head.ref, 'alpha/') && 'alpha' || 'release') }}
        run: node scripts/upload.mjs
