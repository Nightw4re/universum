name: Deploy

env:
  MC_VERSION: 1.21.1

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        type: choice
        options:
          - curseforge
          - modrinth
          - both
      force_publish:
        description: Force publish even if version did not change
        required: true
        type: boolean
        default: false
      release_channel:
        description: Release channel
        required: true
        type: choice
        options:
          - release
          - alpha

permissions:
  contents: write

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.version.outputs.current }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version changed
        id: version
        shell: bash
        run: |
          current=$(node -p "require('./package.json').version")
          previous=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" || true)
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_publish }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$previous" ] && [ "$current" = "$previous" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version_check
    if: github.event_name == 'workflow_dispatch' || needs.version_check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate changelog
        id: changelog
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          node scripts/release-notes.mjs >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Install
        run: npm ci
      - name: Build ZIP archive
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: universum-zip
          path: build/*.zip
          if-no-files-found: error

  build_modrinth:
    needs: version_check
    if: github.event_name == 'workflow_dispatch' || needs.version_check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate changelog
        id: changelog
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          node scripts/release-notes.mjs >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Install
        run: npm ci
      - name: Build Modrinth pack
        run: npm run build:modrinth
      - name: Upload Modrinth artifact
        uses: actions/upload-artifact@v4
        with:
          name: universum-modrinth
          path: build/modrinth/*.zip
          if-no-files-found: error

  publish_curseforge:
    needs: [version_check, build]
    if: needs.version_check.outputs.changed == 'true' && (github.event_name == 'push' || github.event.inputs.target == 'curseforge' || github.event.inputs.target == 'both')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: universum-zip
          path: build
      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          files: build/*.zip
          name: Universum v${{ needs.version_check.outputs.current }}
          version: ${{ needs.version_check.outputs.current }}
          version-type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel || 'release' }}
          changelog: ${{ needs.build.outputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          java: 21

  publish_modrinth:
    needs: [version_check, build_modrinth]
    if: needs.version_check.outputs.changed == 'true' && (github.event_name == 'push' || github.event.inputs.target == 'modrinth' || github.event.inputs.target == 'both')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: universum-modrinth
          path: build
      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/*.zip
          name: Universum v${{ needs.version_check.outputs.current }}
          version: ${{ needs.version_check.outputs.current }}
          version-type: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel || 'release' }}
          changelog: ${{ needs.build_modrinth.outputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          java: 21
